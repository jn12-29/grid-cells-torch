task:
  env_size: 2.2 # environment size in meters
  n_pc: [256] # list of place cell counts
  pc_scale: [0.01] # place cell standard deviation (meters)
  n_hdc: [12] # head direction cell count
  hdc_concentration: [20.0] # Von Mises concentration parameter
  seq_len: 1000 # trajectory sequence length
  neurons_seed: 8341 # random seed (matches original)
  targets_type: "softmax"
  lstm_init_type: "softmax"
  velocity_noise: [0.0, 0.0, 0.0]

model:
  nh_lstm: 128
  nh_bottleneck: 256
  dropout_rate: 0.5
  bottleneck_has_bias: false
  init_weight_disp: 0.0

training:
  epochs: 1000
  steps_per_epoch: 1000
  batch_size: 10
  data_path: "data/train.npz"
  eval_batch_size: 4000
  eval_data_path: "data/eval.npz"
  optimizer: "adamw"
  lr: 1.0e-3
  momentum: 0.9
  adamw_betas: [0.9, 0.999]
  adamw_eps: 1.0e-8
  weight_decay: 1.0e-5
  grad_clip: 1.0e-3
  eval_every: 10
  save_dir: "./results"
  run_name: null
  timestamp_save_dir: true
  use_tqdm: true
  use_tensorboard: true
  tensorboard_log_every: 0
  eval_loader_batch_size: 256
  eval_plot_every: 1
  eval_num_workers: 4
  eval_chunk_size: 32
  eval_units_per_page: 128
  eval_pdf_dpi: 100
  eval_anim_num_traj: 1   # trajectories to animate (taken from the first eval batch)
  eval_anim_fps: 20       # playback frame rate
  eval_anim_step: 4       # render every N-th timestep (4 → 4× speed, 1000 steps → 250 frames)
  eval_anim_workers: 4    # parallel workers (one per trajectory, only matters if num_traj > 1)

visualization:
  spatial_bins: 32
  directional_bins: 20
